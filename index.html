<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>
Validación documento
</title>

<style>

body{

font-family:Arial;

max-width:800px;

margin:auto;

padding:30px;

background:#f5f5f5;

}

.card{

background:white;

padding:30px;

border-radius:12px;

box-shadow:
0 2px 10px rgba(
0,0,0,.1
);

}

.ok{

color:green;

}

.error{

color:red;

}

p{

margin:10px 0;

}

</style>

</head>

<body>

<div id="app">

Cargando...

</div>

<script>

const API=
"https://script.google.com/macros/s/AKfycbyXnBswR6mQDPE9fz-BAra21MCNXZNEPBEmNGHP58PidGGhZTIZ7yIJPPAwwfCrLZ3NsA/exec";


const params=
new URLSearchParams(
window.location.search
);


const token=
params.get("t");


if(!token){

document
.getElementById(
"app"
)

.innerHTML=

"<h1>QR inválido</h1>";

}else{

load();

}



async function load(){

try{

const response=
await fetch(

API+

"?t="+token+

"&agent="+

encodeURIComponent(
navigator.userAgent
)

);

const data=
await response.json();

render(data);

}catch(error){

document
.getElementById(
"app"
)

.innerHTML=

"<h1 class='error'>Error servidor</h1>";

}

}



function render(res){

if(!res.ok){

document
.getElementById(
"app"
)

.innerHTML=`

<div class=card>

<h1 class=error>

Documento inválido

</h1>

<p>

${res.message}

</p>

</div>

`;

return;

}


let d=res.data;


document
.getElementById(
"app"
)

.innerHTML=`

<div class=card>

<h1 class=ok>

✓ Documento válido

</h1>

<p>
Código:
${d.Código}
</p>

<p>
Estado:
${d.Estado}
</p>

<p>
Fecha:
${d.Fecha}
</p>

<p>
Versión:
${d.Versión}
</p>

<p>
Observación:
${d.Observación}
</p>

<a
href="${d.PDF_URL}"
target=_blank
>

Descargar PDF

</a>

</div>

`;

}

</script>

</body>

</html>
